<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Event Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="layout/navbar :: navbar"></div>

<div class="container mt-4">

    <h2 th:text="${event.name}"></h2>

    <p>
        <strong>Date:</strong>
        <span th:text="${event.date}"></span>
    </p>

    <p>
        <strong>Type:</strong>
        <span th:text="${event.type.name}"></span>
    </p>

    <p>
        <strong>Location:</strong>
        <span th:text="${event.location}"></span>
    </p>

    <p>
        <strong>Description:</strong>
        <span th:text="${event.description}"></span>
    </p>

    <p>
        <strong>Club:</strong>
        <a th:href="@{/clubs/{id}(id=${club.id})}"
           th:text="${club.name}"></a>
    </p>

    <!-- ACTIONS -->
    <div class="mt-3">
        <a th:href="@{/clubs/{clubId}/events/{id}/edit(clubId=${club.id}, id=${event.id})}"
           class="btn btn-warning">
            Edit
        </a>

        <a th:href="@{/clubs/{clubId}/events/{id}/delete(clubId=${club.id}, id=${event.id})}"
           class="btn btn-danger">
            Delete
        </a>
    </div>

</div>

</body>
</html>
