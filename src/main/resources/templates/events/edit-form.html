<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Event</title>
</head>
<body>

<div th:replace="layout/navbar :: navbar"></div>

<div class="container mt-4">

    <form th:action="@{/clubs/{clubId}/events/{id}(clubId=${clubId}, id=${eventId})}"
          th:object="${eventForm}"
          method="post">

        <input type="hidden" name="_method" value="put">

        Name:
        <input type="text" th:field="*{name}"/>
        <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>

        <br>

        Date:
        <input type="date" th:field="*{date}"/>
        <span th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></span>

        <br>

        Type:
        <select th:field="*{typeId}">
            <option value="">Select type</option>
            <option th:each="t : ${types}"
                    th:value="${t.id}"
                    th:text="${t.name}"
                    th:selected="${t.id == eventForm.typeId}">
            </option>
        </select>

        <span th:if="${#fields.hasErrors('typeId')}" th:errors="*{typeId}"></span>

        <br>

        <button type="submit">Update</button>

    </form>

</div>

</body>
</html>
