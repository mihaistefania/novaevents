<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Event</title>
</head>
<body>

<div th:replace="layout/navbar :: navbar"></div>

<div class="container mt-4">

    <form th:action="@{/clubs/{clubId}/events/{id}(clubId=${clubId}, id=${eventId})}"
          th:object="${eventForm}"
          method="post">

        <input type="hidden" name="_method" value="put">

        <!-- NAME -->
        <div>
            Name:
            <input type="text" th:field="*{name}"/>
            <span th:if="${#fields.hasErrors('name')}"
                  th:errors="*{name}"></span>
        </div>

        <br>

        <!-- DATE -->
        <div>
            Date:
            <input type="date" th:field="*{date}"/>
            <span th:if="${#fields.hasErrors('date')}"
                  th:errors="*{date}"></span>
        </div>

        <br>

        <!-- TYPE -->
        <div>
            Type:
            <select th:field="*{typeId}">
                <!-- ❗ IMPORTANT: allow empty to trigger validation -->
                <option value="">-- Select type --</option>

                <option th:each="t : ${types}"
                        th:value="${t.id}"
                        th:text="${t.name}">
                </option>
            </select>

            <span th:if="${#fields.hasErrors('typeId')}"
                  th:errors="*{typeId}"></span>
        </div>

        <br>

        <!-- GLOBAL ERROR -->
        <div th:if="${error}">
            <span th:text="${error}"></span>
        </div>

        <br>

        <button type="submit">Update</button>

    </form>

</div>

</body>
</html>
