<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="layout/navbar :: navbar"></div>

<div class="container mt-4">

    <h2>All Events</h2>

    <div class="card p-3 mb-4">
        <form method="get" action="/events">

            <div class="row g-3">

                <div class="col-md-3">
                    <label class="form-label">Event Type</label>
                    <select class="form-control" name="type">
                        <option value="">All types</option>
                        <option th:each="t : ${T(pt.unl.fct.iadi.novaevents.model.EventType).values()}"
                                th:value="${t}"
                                th:text="${t}"
                                th:selected="${t} == ${param.type}">
                        </option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Club</label>
                    <select class="form-control" name="clubId">
                        <option value="">All clubs</option>
                        <option th:each="c : ${clubs}"
                                th:value="${c.id}"
                                th:text="${c.name}"
                                th:selected="${c.id} == ${param.clubId}">
                        </option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label class="form-label">From</label>
                    <input type="date" class="form-control"
                           name="from"
                           th:value="${param.from}">
                </div>

                <div class="col-md-2">
                    <label class="form-label">To</label>
                    <input type="date" class="form-control"
                           name="to"
                           th:value="${param.to}">
                </div>

                <div class="col-md-2 d-flex align-items-end">
                    <button class="btn btn-primary w-100">Filter</button>
                </div>

            </div>

        </form>
    </div>

    <table class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr>
            <th>Name</th>
            <th>Club</th>
            <th>Date</th>
            <th>Type</th>
            <th>Location</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>

        <tr th:if="${#lists.isEmpty(events)}">
            <td colspan="6" class="text-center">No events found</td>
        </tr>

        <tr th:each="event : ${events}">

            <td>
                <a th:href="@{/clubs/{clubId}/events/{id}(clubId=${event.clubId}, id=${event.id})}"
                   th:text="${event.name}"></a>
            </td>

            <td th:text="${event.clubId}"></td>

            ...

            <td>
                <a class="btn btn-outline-primary btn-sm"
                   th:href="@{/clubs/{clubId}/events/{id}/edit(clubId=${event.clubId}, id=${event.id})}">
                    Edit
                </a>

                <a class="btn btn-outline-danger btn-sm"
                   th:href="@{/clubs/{clubId}/events/{id}/delete(clubId=${event.clubId}, id=${event.id})}">
                    Delete
                </a>
            </td>

        </tr>

        </tbody>
    </table>

</div>

</body>
</html>
