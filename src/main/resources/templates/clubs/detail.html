<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Club Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="layout/navbar :: navbar"></div>

<div class="container mt-4">

    <h2 th:text="${club.name}"></h2>

    <span class="badge bg-primary" th:text="${club.category}"></span>

    <p class="mt-3" th:text="${club.description}"></p>

    <div class="mb-3">
        <a class="btn btn-outline-primary" href="/events">View Events</a>

        <a class="btn btn-success"
           th:href="@{/events/create/{clubId}(clubId=${club.id})}">
            + Add Event
        </a>
    </div>

    <h4>Events</h4>

    <table class="table table-striped">
        <tbody>
        <tr th:each="event : ${events}">
            <td>
                <a th:href="@{/clubs/{clubId}/events/{eventId}(clubId=${event.clubId}, eventId=${event.id})}"
                   th:text="${event.name}"></a>
            </td>
            <td th:text="${event.date}"></td>
            <td>
                <span class="badge bg-secondary" th:text="${event.type}"></span>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
